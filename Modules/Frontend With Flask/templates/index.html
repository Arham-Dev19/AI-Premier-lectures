<!DOCTYPE html>
<html>
<head>
    <title>Users List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">Users List</h2>
        <a href="/add" class="btn btn-success">+ Add New</a>
    </div>
    <div class="card shadow">
        <div class="card-body">
            {% if data %}
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Course</th>
                            <th colspan="2">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in data %}
                        <tr>
                            <td>{{ item.name }}</td>
                            <td>{{item.email}}</td>
                            <td>{{item.age}}</td>
                            <td>{{item.gender}}</td>
                            <td>{{item.course}}</td>
                            <td>
                                <a href="/edit/{{ item._id }}" class="btn btn-warning btn-sm">Edit</a>
                                <a href="/delete/{{ item._id }}" class="btn btn-danger btn-sm"
                                   onclick="return confirm('Are you sure?')">
                                   Delete
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            {% else %}
                <p class="text-center text-muted">No users found</p>
            {% endif %}
        </div>
    </div>
</div>
<a href="/products" class="btn btn-secondary">GO TO PRODUCT PAGE</a>
</body>
</html>
