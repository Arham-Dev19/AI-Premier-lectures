<!DOCTYPE html>
<html>
<head>
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<h2>👥 Manage Users</h2>

<a href="/add-user" class="btn btn-success mb-3">➕ Add User</a>

<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Action</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{user.name}}</td>
        <td>{{user.email}}</td>
        <td>{{user.role}}</td>
        <td>
            <a href="/edit-user/{{user._id}}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete-user/{{user._id}}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="/admin" class="btn btn-secondary">Back</a>

</body>
</html>
